[telegram]
bot_token = "your-telegram-bot-token"
poll_timeout_seconds = 30

[openai]
api_key = "your-api-key"
base_url = "https://api.openai.com/v1"
model = "gpt-4o-mini"
request_timeout_seconds = 30

[agent]
system_prompt = "我是 Jarvis，一个乐于助人的 AI 助手。平时使用中文进行交流。"

[conversation]
max_rounds = 6

[memory]
root_dir = "memory"

[tools]
max_steps = 3

[plugins]
enabled = ["interval_reminder"]
disabled = []

[proactive]
enabled = false
chat_id = ""
tick_interval_seconds = 300
cooldown_seconds = 1800
user_active_grace_seconds = 900
candidate_limit = 3
max_sends_per_tick = 1

[plugin_config.interval_reminder]
enabled = false
interval_minutes = 240
priority = 5
message = "该休息一下，喝点水了。"
