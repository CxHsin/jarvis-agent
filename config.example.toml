[telegram]
bot_token = "your-telegram-bot-token"
poll_timeout_seconds = 30

[openai]
api_key = "your-api-key"
base_url = "https://api.openai.com/v1"
model = "gpt-4o-mini"
request_timeout_seconds = 30

[agent]
system_prompt = "我是 Jarvis，一个乐于助人的 AI 助手。平时使用中文进行交流。"

[conversation]
max_rounds = 6

[memory]
root_dir = "memory"

[tools]
max_steps = 3

[plugins]
enabled = ["interval_reminder"]
disabled = []

[proactive]
enabled = false
chat_id = ""
tick_interval_seconds = 300
cooldown_seconds = 1800
user_active_grace_seconds = 900
candidate_limit = 3
max_sends_per_tick = 1

[drift]
enabled = false
tick_interval_seconds = 300
idle_grace_seconds_after_user_message = 900
idle_grace_seconds_after_proactive_send = 900
dedupe_window_seconds = 3600
max_task_runtime_seconds = 30
max_task_cost = 3

[plugin_config.interval_reminder]
enabled = false
interval_minutes = 240
priority = 5
message = "该休息一下，喝点水了。"

[plugin_config.pending_review_drift]
enabled = false
priority = 3
estimated_cost = 1
log_path = "memory/pending-review.log"
preview_lines = 3
